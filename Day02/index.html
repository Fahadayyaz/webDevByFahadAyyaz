<!doctype html>
<!-- 
This tells the browser that the document is written in HTML5.
Always place this at the top of your HTML file.
-->

<html lang="en">
  <!-- 
The <html> tag is the root of the HTML document.
lang="en" tells browsers and search engines that the page language is English.
-->

  <head>
    <!-- 
    The <head> section contains information ABOUT the webpage,
    not the visible content of the page.
    -->

    <meta charset="UTF-8" />
    <!-- 
    This sets the character encoding to UTF-8.
    It allows the webpage to display most characters and symbols properly.
    -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 
    This makes the webpage responsive on mobile devices.
    width=device-width makes the page match the screen width.
    initial-scale=1.0 sets the initial zoom level.
    -->

    <title>Day2</title>
    <!-- 
    The <title> appears in the browser tab.
    It also helps with SEO and bookmarking.
    -->

    <link rel="stylesheet" href="style.css" />
    <!-- 
    We need to add some styles on our boring html page to make it beautiful and look awesome.
    This links an external CSS file to style the webpage.
    rel="stylesheet" tells the browser this is a CSS stylesheet.
    href="style.css" is the path to the CSS file.
    -->
  </head>

  <body>
    <!-- 
    The <body> contains all the content visible on the webpage.
    -->

    <h1>Hey, this is Day 2 of web development.</h1>
    <!-- 
    <h1> is the largest heading in HTML.
    It is usually used for the main title of the page.
    -->

    <p>Hope you guys are enjoying.</p>
    <!-- 
    <p> is a paragraph tag used for normal text content.
    -->

    <!-- javascript part here-->
    <script src="script.js"></script>
    <!-- 
    This connects an external JavaScript file to the webpage.
    JavaScript is used to add interactivity and logic.
    src="script.js" is the file containing the JS code.
    -->
  </body>
</html>
